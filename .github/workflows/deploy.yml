name: CI/CD Production Deployment

on:
  push:
    branches:
      - main
      - staging
      - feature/production-deployment-telemetry
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package Microservices
        run: ./mvnw clean package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Microservice Images (Multi-Architecture)
        run: |
          # Determine the docker tag based on the branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="latest"
          else
            TAG="staging"
          fi
          
          # Convert repository owner to lowercase for Docker image constraints
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          SERVICES=("api-gateway" "ms-core-ui" "ms-vets-owners" "ms-visits" "prometheus" "grafana" "loki" "promtail")
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building multi-arch image for $SERVICE with tag $TAG..."
            IMAGE_NAME="${{ env.REGISTRY }}/$OWNER_LC/spring-petclinic-$SERVICE"
            
            # Build and push the multi-architecture Docker image using buildx
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -t "$IMAGE_NAME:$TAG" \
              -t "$IMAGE_NAME:${{ github.sha }}" \
              -f "./$SERVICE/Dockerfile" \
              "./$SERVICE" \
              --push
          done

      - name: Trigger Portainer Stack Redeploy Webhook
        if: success()
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            WEBHOOK_URL="${{ secrets.PORTAINER_WEBHOOK_URL }}"
            ENV_NAME="production"
          else
            WEBHOOK_URL="${{ secrets.PORTAINER_WEBHOOK_URL_STAGING }}"
            ENV_NAME="staging"
          fi
          
          if [ -n "$WEBHOOK_URL" ]; then
            echo "Triggering Portainer stack redeploy for $ENV_NAME..."
            curl -X POST -s -o /dev/null -w "%{http_code}" "$WEBHOOK_URL"
          else
            echo "Webhook URL for $ENV_NAME is not set. Skipping redeployment trigger."
          fi
