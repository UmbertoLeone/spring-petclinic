services:
  postgres:
    image: postgres:18.4
    environment:
      - POSTGRES_DB=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASSWORD=petclinic
    volumes:
      - petclinic-postgres-data-prod:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic -d petclinic"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-vets-owners:
    image: ghcr.io/umbertoleone/spring-petclinic-ms-vets-owners:latest
    pull_policy: always
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
    depends_on:
      postgres:
        condition: service_healthy

  ms-visits:
    image: ghcr.io/umbertoleone/spring-petclinic-ms-visits:latest
    pull_policy: always
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
    depends_on:
      postgres:
        condition: service_healthy
      ms-vets-owners:
        condition: service_started

  ms-core-ui:
    image: ghcr.io/umbertoleone/spring-petclinic-ms-core-ui:latest
    pull_policy: always
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
      - MS_VETS_OWNERS_URL=http://ms-vets-owners:8081
      - MS_VISITS_URL=http://ms-visits:8082
    depends_on:
      - ms-vets-owners
      - ms-visits

  api-gateway:
    image: ghcr.io/umbertoleone/spring-petclinic-api-gateway:latest
    pull_policy: always
    ports:
      - "8085:8080"
    environment:
      - MS_VETS_OWNERS_URL=http://ms-vets-owners:8081
      - MS_VISITS_URL=http://ms-visits:8082
      - MS_CORE_UI_URL=http://ms-core-ui:8083
    depends_on:
      - ms-core-ui

  prometheus:
    image: ghcr.io/umbertoleone/spring-petclinic-prometheus:latest
    pull_policy: always
    container_name: prometheus
    restart: always
    volumes:
      - petclinic-prometheus-data-prod:/prometheus

  grafana:
    image: ghcr.io/umbertoleone/spring-petclinic-grafana:latest
    pull_policy: always
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/jvm-micrometer.json
    volumes:
      - petclinic-grafana-data-prod:/var/lib/grafana
    depends_on:
      - prometheus

  loki:
    image: ghcr.io/umbertoleone/spring-petclinic-loki:latest
    pull_policy: always
    container_name: loki
    user: "0:0"
    restart: always
    volumes:
      - petclinic-loki-data-prod:/tmp/loki

  promtail:
    image: ghcr.io/umbertoleone/spring-petclinic-promtail:latest
    pull_policy: always
    container_name: promtail
    user: "0:0"
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

volumes:
  petclinic-postgres-data-prod:
  petclinic-prometheus-data-prod:
  petclinic-grafana-data-prod:
  petclinic-loki-data-prod:
