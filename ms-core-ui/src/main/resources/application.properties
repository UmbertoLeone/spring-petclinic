server.port=8083
spring.application.name=ms-core-ui

# Downstream services URL (defaulting to Docker service hosts, overridable)
services.vets-owners.url=${MS_VETS_OWNERS_URL:http://ms-vets-owners:8081}
services.visits.url=${MS_VISITS_URL:http://ms-visits:8082}

# Web/Thymeleaf
spring.thymeleaf.mode=HTML
spring.messages.basename=messages/messages
spring.web.resources.cache.cachecontrol.max-age=12h

# Database settings (included for configuration sharing credentials compliance)
database=h2
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=16

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
