services:
  postgres:
    image: postgres:18.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASSWORD=petclinic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic -d petclinic"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-vets-owners:
    build:
      context: ./ms-vets-owners
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
    depends_on:
      postgres:
        condition: service_healthy

  ms-visits:
    build:
      context: ./ms-visits
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
    depends_on:
      postgres:
        condition: service_healthy
      ms-vets-owners:
        condition: service_started

  ms-core-ui:
    build:
      context: ./ms-core-ui
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
      - MS_VETS_OWNERS_URL=http://ms-vets-owners:8081
      - MS_VISITS_URL=http://ms-visits:8082
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
      - SERVER_SERVLET_SESSION_TRACKING_MODES=cookie
    depends_on:
      - ms-vets-owners
      - ms-visits

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MS_VETS_OWNERS_URL=http://ms-vets-owners:8081
      - MS_VISITS_URL=http://ms-visits:8082
      - MS_CORE_UI_URL=http://ms-core-ui:8083
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_TRUSTED_PROXIES=.*
    depends_on:
      - ms-core-ui

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  portainer_data:
